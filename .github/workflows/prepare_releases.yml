name: Prepare Release
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Release Tag
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: ${{ secrets.ETI_TOKEN }}
          automatic_release_tag: "latest"
          prerelease: false
